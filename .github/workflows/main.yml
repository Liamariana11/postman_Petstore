name: Testes Automatizados Postman

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-api-tests:
    runs-on: ubuntu-latest 

    steps:
      - name: Baixando os arquivos do repositório
        uses: actions/checkout@v4
      - name: Instalando o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalando o Newman (Executor do Postman)
        run: npm install -g newman

      - name: Rodando os Testes da Petstore
        run: newman run ICEV.postman_collection.json --reporters cli
